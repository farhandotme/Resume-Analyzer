services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always

  valkey:
    image: valkey/valkey:latest
    container_name: valkey-server
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: always

volumes:
  valkey_data:
